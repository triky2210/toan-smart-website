<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Toán Smart</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be Vietnam Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Link -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-logo-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-calculator" style="color: var(--accent-color); margin-right: 8px;"></i>
                Toán <span style="color: var(--accent-color);">Smart</span>
            </a>
        </div>
        
        <div class="login-card">
            <!-- FORM ĐẶT LẠI MẬT KHẨU -->
            <form id="resetPasswordForm">
                <h3 class="login-card-title">Đặt Mật Khẩu Mới</h3>
                <p style="font-size: 0.9rem; color: var(--text-secondary); text-align: center; margin-bottom: 20px; line-height: 1.5;">Vui lòng nhập mật khẩu mới cho tài khoản học viên.</p>
                
                <div class="login-form-group">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" class="login-input" placeholder="Tối thiểu 6 ký tự" required autocomplete="new-password">
                </div>
                
                <div class="login-form-group">
                    <label for="confirmNewPassword">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmNewPassword" class="login-input" placeholder="Nhập lại mật khẩu mới" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="login-submit-btn">Cập nhật mật khẩu</button>
            </form>
            
            <div class="login-footer">
                <p><a href="login.html"><i class="fa-solid fa-arrow-left" style="margin-right: 4px;"></i> Quay lại Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <!-- Supabase JS Client library CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Configuration -->
    <script src="js/config.js"></script>
    <!-- Reset Password Script -->
    <script src="js/reset-password.js"></script>
</body>
</html>
