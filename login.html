<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - Toán Smart</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Link -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-logo-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-calculator" style="color: var(--accent-color); margin-right: 8px;"></i>
                Toán <span style="color: var(--accent-color);">Smart</span>
            </a>
        </div>
        
        <div class="login-card">
            <div class="login-tabs">
                <button class="login-tab-btn active" id="tabLoginBtn">Đăng nhập</button>
                <button class="login-tab-btn" id="tabRegisterBtn">Đăng ký</button>
            </div>
            
            <!-- FORM ĐĂNG NHẬP -->
            <form id="loginForm">
                <h3 class="login-card-title">Học Viên Đăng Nhập</h3>
                <div class="login-form-group">
                    <label for="loginEmail">Email học viên</label>
                    <input type="email" id="loginEmail" class="login-input" placeholder="mail@example.com" required autocomplete="email">
                </div>
                <div class="login-form-group">
                    <label for="loginPassword">Mật khẩu</label>
                    <input type="password" id="loginPassword" class="login-input" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-submit-btn">Đăng nhập ngay</button>
            </form>
            
            <!-- FORM ĐĂNG KÝ -->
            <form id="registerForm" style="display: none;">
                <h3 class="login-card-title">Tạo Tài Khoản Mới</h3>
                <div class="login-form-group">
                    <label for="registerName">Họ và tên học sinh</label>
                    <input type="text" id="registerName" class="login-input" placeholder="Ví dụ: Nguyễn Văn A" required autocomplete="name">
                </div>
                <div class="login-form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" class="login-input" placeholder="mail@example.com" required autocomplete="email">
                </div>
                <div class="login-form-group">
                    <label for="registerPassword">Mật khẩu</label>
                    <input type="password" id="registerPassword" class="login-input" placeholder="Tối thiểu 6 ký tự" required autocomplete="new-password">
                </div>
                <div class="login-form-group">
                    <label for="registerConfirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="registerConfirmPassword" class="login-input" placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
                </div>
                <button type="submit" class="login-submit-btn">Đăng ký tài khoản</button>
            </form>
            
            <div class="login-footer">
                <p><a href="index.html"><i class="fa-solid fa-arrow-left" style="margin-right: 4px;"></i> Quay lại trang chủ</a></p>
            </div>
        </div>
    </div>

    <!-- Supabase JS Client library CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Configuration -->
    <script src="js/config.js"></script>
    <!-- Authentication Script -->
    <script src="js/login.js"></script>
</body>
</html>
